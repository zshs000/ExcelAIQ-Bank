server:
  port: 8088

spring:
  profiles:
    active: dev

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

rocketmq:
  name-server: 192.168.118.128:9876
  producer:
    group: question-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 3

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

feature:
  mq:
    enabled: true
    mock-enabled: false

question:
  dispatch:
    outbox-scan-initial-delay-ms: 10000
    outbox-scan-delay-ms: 5000
    scan-batch-limit: 100
    sending-timeout-ms: 300000
    max-retries: 8
    retry-initial-delay-ms: 30000
    retry-max-delay-ms: 1800000
  import:
    cleanup:
      initial-delay-ms: 60000
      delay-ms: 3600000
      batch-limit: 200
      committed-retention-days: 7
      failed-retention-days: 7
      aborted-retention-days: 1
